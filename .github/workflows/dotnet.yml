name: .NET API Tests

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x


    - name: Restore dependencies
      run: dotnet restore "Catalogo API.sln"


    - name: Build
      run: dotnet build "Catalogo API.sln"


    - name: Run tests
      run: dotnet test "Catalogo API.sln"